<div class="header">
  <span class="level-title">Level {{ currentLevel }}</span>
</div>
<div class="grid-container">
  @for (row of displayGrid; let y = $index; track y) {
    <div class="row">
      @for (buttonText of row; let x = $index; track x) {
        <button class="btn" [class]="getButtonClass(buttonText) + ' ' + getCornerClass(x, y)" (click)="onButtonClick(x, y)">
          @if (isNumber(buttonText)) {
            <span class="number-circle">{{ buttonText }}</span>
          }
        </button>
      }
    </div>
  }
</div>
<div class="header">
  <div class="button-group">
    <button class="undo-btn" (click)="undo()">Undo</button>
    <button class="undo-btn" (click)="reset()">Reset</button>
  </div>
</div>

@if (showLevelComplete) {
  <div class="dialog-overlay">
    <div class="dialog">
      <h2>Well Done!</h2>
      <p>Level {{ currentLevel }} completed</p>
      <button class="next-btn" (click)="nextLevelClick()">Next Level</button>
    </div>
  </div>
}
